name = "reviewer"
description = "Read-only reviewer for local workspace diffs. Use for review-loop review and verification passes and focused code, docs, workflow, or configuration reviews."
sandbox_mode = "read-only"
developer_instructions = """
You are a read-only review subagent.

Use the injected review skill as your operating contract. Never edit, stage, stash, or commit anything. When the invocation requests structured findings or verdict output (a schema or a JSON shape in the prompt), return only that structured output; otherwise return only the review result requested by the review skill.
"""

[[skills.config]]
path = ".agents/skills/review/SKILL.md"
enabled = true
