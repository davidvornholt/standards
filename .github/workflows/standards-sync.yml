name: Standards sync

# Closes the one gap `standards check` cannot: it detects local tampering, not that
# UPSTREAM moved on. This runs `sync` on a cadence and opens a PR when the
# mirror actually changes, so a repo learns about new standards without anyone
# remembering to pull. Synced from davidvornholt/standards; in the standards
# repo itself it is a harmless no-op (nothing upstream of the source).
#
# Cadence and pinning are repo policy, not canonical content, so they live in
# the consumer-owned sync-standards.local.json next to this (read-only) file,
# versioned and reviewable like any other configuration. All fields optional:
#   { "autoSync": false }  skip the weekly scheduled run; manual
#                          workflow_dispatch still works and stays the
#                          sanctioned way to sync deliberately.
#   { "ref": "v0.7.0" }    tag, branch, or full commit sha to sync from
#                          instead of main. The CLI reads the same file, so a
#                          local `bun standards sync` obeys the same pin.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: standards-sync
  cancel-in-progress: false

# Every job uses a fresh GitHub-hosted runner because sync eventually resolves
# SOPS_AGE_KEY. CI_RUNNER is reserved for the unprivileged Standards quality job.
jobs:
  # Cheap preflight: job-level `if:` expressions cannot read repository files,
  # so this job surfaces the checked-in policy for the gate below. A missing
  # file means the defaults (auto-sync on); an unparseable one fails this job
  # loudly — and with it the gated sync — rather than guessing a default.
  policy:
    runs-on: ubuntu-latest
    outputs:
      auto-sync: ${{ steps.read.outputs.auto-sync }}
      present: ${{ steps.read.outputs.present }}
      ref: ${{ steps.read.outputs.ref }}
    steps:
      - name: Checkout policy file
        uses: actions/checkout@v7
        with:
          sparse-checkout: sync-standards.local.json
          sparse-checkout-cone-mode: false

      - name: Read sync policy
        id: read
        run: |
          if [ -f sync-standards.local.json ]; then
            if ! jq -e '
              type == "object"
              and ((keys - ["autoSync", "ref"]) | length == 0)
              and ((has("autoSync") | not) or (.autoSync | type == "boolean"))
              and (
                (has("ref") | not)
                or (
                  (.ref | type == "string")
                  and (.ref | length > 0)
                  and (.ref | contains("\n") | not)
                  and (.ref | contains("\r") | not)
                )
              )
            ' sync-standards.local.json > /dev/null; then
              echo "::error::sync-standards.local.json must be an object with only an optional boolean autoSync and optional non-empty single-line string ref"
              exit 1
            fi
            auto_sync=$(jq -r 'if has("autoSync") then .autoSync else true end' sync-standards.local.json)
            ref=$(jq -r 'if has("ref") then .ref else "" end' sync-standards.local.json)
            present=true
          else
            auto_sync=true
            ref=
            present=false
          fi
          {
            echo "auto-sync=$auto_sync"
            echo "present=$present"
            echo "ref=$ref"
          } >> "$GITHUB_OUTPUT"

  sync:
    needs: policy
    # Manual dispatch always runs — it is a deliberate act; only the scheduled
    # cadence is gated on the checked-in opt-out.
    if: github.event_name == 'workflow_dispatch' || needs.policy.outputs.auto-sync != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # A consumer can receive this canonical workflow before upgrading its
      # repo-owned package manifest. Fail before sync instead of letting an
      # older CLI mirror canonical files without enforcing their lock-backed
      # managed-file contract.
      - name: Require compatible standards CLI
        env:
          MINIMUM_STANDARDS_VERSION: "0.11.1"
        run: |
          package_path=node_modules/@davidvornholt/standards/package.json
          installed_version=$(jq -er '.version | select(type == "string")' "$package_path")
          if [[ ! "$installed_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Installed @davidvornholt/standards version is not a stable SemVer: $installed_version"
            exit 1
          fi
          lowest_version=$(printf '%s\n%s\n' "$MINIMUM_STANDARDS_VERSION" "$installed_version" | sort -V | head -n 1)
          if [ "$lowest_version" != "$MINIMUM_STANDARDS_VERSION" ]; then
            echo "::error::Canonical managed-file checks require @davidvornholt/standards >= $MINIMUM_STANDARDS_VERSION; upgrade package.json and bun.lock before accepting this workflow"
            exit 1
          fi

      # Forward the validated policy pin explicitly as a second fail-closed
      # boundary. The CLI also reads and validates the same document, so local
      # init/sync commands and this workflow retain one policy owner.
      - name: Sync canonical files from upstream
        env:
          SYNC_POLICY_REF: ${{ needs.policy.outputs.ref }}
        run: |
          if [ -n "$SYNC_POLICY_REF" ]; then
            bun standards sync --ref "$SYNC_POLICY_REF"
          else
            bun standards sync
          fi

      - name: Detect mirror changes
        id: mirror
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Already in sync with upstream standards; nothing to open."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # The PR-opening token comes from the repo's encrypted CI secrets
      # (ci.standards_sync_token in secrets/ci.yaml, a fine-grained PAT with
      # Contents read + Pull requests write), decrypted with the single
      # SOPS_AGE_KEY bootstrap Actions secret. The PAT is only resolved after
      # the cheap no-change check. PRs opened with it trigger the required
      # Standards gate automatically. Without it, the workflow token can create
      # a PR only when repository or organization policy allows Actions to do
      # so; the resulting workflow runs wait for maintainer approval.
      - name: Resolve sync PR token
        if: steps.mirror.outputs.changed == 'true'
        id: sync-token
        uses: ./.github/actions/sops-secret
        with:
          age-key: ${{ secrets.SOPS_AGE_KEY }}
          secret-file: secrets/ci.yaml
          secret-key: standards_sync_token
          env-name: GH_TOKEN
          fallback-value: ${{ github.token }}
          failure-mode: fallback

      - name: Report sync PR token fallback
        if: steps.mirror.outputs.changed == 'true' && steps.sync-token.outputs.used-fallback == 'true'
        run: |
          echo "::warning::ci.standards_sync_token could not be resolved from secrets/ci.yaml; the workflow will try to open the sync PR with the workflow token."
          echo "::warning::If repository policy permits that PR, approve its queued workflow runs. Otherwise gh pr create will fail after pushing the sync branch, leaving the branch without a PR."

      # This workflow deliberately runs no inline `bun run check`: the synced
      # result is validated by the required Standards gate on the PR it opens,
      # like any other change. An inline gate would duplicate the gate's
      # environment (services, browsers) into a second canonical file forever,
      # and its failure would withhold the PR exactly when upstream breaking a
      # consumer most needs to be visible — an open PR with a red required
      # check is the signal, and branch protection keeps it unmergeable.
      #
      # `gh pr create` is left to default `--base` to the repository's default
      # branch: the `schedule` event carries no payload, so expressions like
      # `github.event.repository.default_branch` are empty here.
      - name: Open a pull request if the mirror changed
        if: steps.mirror.outputs.changed == 'true'
        run: |
          branch="standards-sync/$(date -u +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -A
          git commit -m "chore: sync standards from upstream"
          git push --set-upstream origin "$branch"
          gh pr create \
            --head "$branch" \
            --title "chore: sync standards from upstream" \
            --body "Automated sync from davidvornholt/standards. These are canonical (read-only) files; review the changes and merge to adopt them. Generated by the \`Standards sync\` workflow."
