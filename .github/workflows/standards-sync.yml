name: Standards sync

# Closes the one gap `standards check` cannot: it detects local tampering, not that
# UPSTREAM moved on. This runs `sync` on a cadence and opens a PR when the
# mirror actually changes, so a repo learns about new standards without anyone
# remembering to pull. Synced from davidvornholt/standards; in the standards
# repo itself it is a harmless no-op (nothing upstream of the source).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: standards-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'app' }}
          POSTGRES_PASSWORD: ${{ vars.CI_POSTGRES_PASSWORD || 'app' }}
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'app' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ vars.CI_POSTGRES_USER || 'app' }} -d ${{ vars.CI_POSTGRES_DB || 'app' }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://${{ vars.CI_POSTGRES_USER || 'app' }}:${{ vars.CI_POSTGRES_PASSWORD || 'app' }}@127.0.0.1:5432/${{ vars.CI_POSTGRES_DB || 'app' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect browser a11y suite
        id: a11y
        run: |
          if find . -path ./node_modules -prune -o \
            \( -name 'playwright.config.*' -o -name '*.a11y.ts' \) -print | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync canonical files from upstream
        run: bun standards sync

      - name: Install Playwright Chromium
        if: steps.a11y.outputs.present == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Validate the synchronized repository
        run: bun run check

      # `gh pr create` is left to default `--base` to the repository's default
      # branch: the `schedule` event carries no payload, so expressions like
      # `github.event.repository.default_branch` are empty here. Note that PRs
      # opened with GITHUB_TOKEN do not trigger other workflows — push to the
      # branch or close and reopen the PR to run the Standards gate on it.
      - name: Open a pull request if the mirror changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Already in sync with upstream standards; nothing to open."
            exit 0
          fi
          branch="standards-sync/$(date -u +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -A
          git commit -m "chore: sync standards from upstream"
          git push --set-upstream origin "$branch"
          gh pr create \
            --head "$branch" \
            --title "chore: sync standards from upstream" \
            --body "Automated sync from davidvornholt/standards. These are canonical (read-only) files; review the changes and merge to adopt them. Generated by the \`Standards sync\` workflow."
