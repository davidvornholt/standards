name: Notify pause

# An agent pause is a question posted as a comment plus the
# `needs-clarification` label: review-fix cycles pause on pull requests, and
# fix-poller runs pause on issues. The agent posts with the repo owner's own
# account, and GitHub never notifies you of your own activity — so this
# workflow is the doorbell: on the label event it pushes a phone notification
# through ntfy with a deep link to the paused PR or issue. The label is the
# trigger on purpose: the ping fires off the durable state transition, not off
# anything harness-specific the agent has to remember.
#
# The topic URL is a secret (the topic name is its only access control) and
# therefore lives where all work-plane secrets live: as `ci.ntfy_topic_url` in
# the repo-owned, SOPS-encrypted secrets/ci.yaml, decrypted here with the
# single SOPS_AGE_KEY bootstrap Actions secret. Rotate by editing the
# encrypted file like any other secret change.
#
# `pull_request_target` instead of `pull_request` so the run has secrets even
# when the labeled PR comes from a fork. That event is safe here because the
# checkout is the BASE ref (never PR code) and nothing from the PR is
# executed — untrusted input (the PR or issue title) only ever passes through
# an env var into curl's request body. `issues` events always run in the base
# repository context, so the same reasoning covers them trivially.
#
# Every missing precondition fails the run loudly instead of no-oping: a
# doorbell that silently swallows a pause defeats its purpose, and the red
# run on the paused PR is the durable signal that the ping was not delivered.

on:
  pull_request_target:
    types: [labeled]
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  notify:
    if: github.event.label.name == 'needs-clarification'
    # SOPS_AGE_KEY is available here, so this job must never share the
    # configurable runner pool used by unprivileged quality code.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout encrypted CI secrets
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            secrets/ci.yaml
            .sops.yaml
            .github/actions/sops-secret/action.yml
          sparse-checkout-cone-mode: false

      - name: Resolve notification topic URL
        uses: ./.github/actions/sops-secret
        with:
          age-key: ${{ secrets.SOPS_AGE_KEY }}
          secret-file: secrets/ci.yaml
          secret-key: ntfy_topic_url
          env-name: NTFY_TOPIC_URL

      - name: Push a notification
        env:
          PAUSE_TITLE: ${{ github.event.pull_request.title || github.event.issue.title }}
          PAUSE_URL: ${{ github.event.pull_request.html_url || github.event.issue.html_url }}
          REPO: ${{ github.repository }}
          PAUSE_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          curl -sf \
            -H "X-Title: ${REPO}#${PAUSE_NUMBER} needs clarification" \
            -H "X-Click: ${PAUSE_URL}" \
            -H "X-Priority: high" \
            -H "X-Tags: question" \
            --data-raw "$PAUSE_TITLE" \
            "$NTFY_TOPIC_URL"
