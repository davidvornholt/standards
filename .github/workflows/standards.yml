name: Standards

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Canonical quality gate synced from davidvornholt/standards. `bun run check`
  # runs the sync drift-check first, then lint, types, tests, build, and the
  # browser a11y suite. This is meant to be a consumer's WHOLE quality gate; a
  # repo with a deploy pipeline keeps that in its own workflow and stops running
  # the gate there (see the adoption notes in the standards README).
  #
  # A Postgres service is always provisioned because the mandatory a11y gate
  # renders real routes, and on this stack routes are Server Components that
  # query the database at request time — without a live DB they throw before Axe
  # can scan them. Repos with no database simply never connect to it (an idle
  # service container costs a few seconds and nothing else); making it
  # conditional would fork this file per-repo and defeat a single uniform gate.
  #
  # Per-repo DB coordinates come from repository Actions VARIABLES (Settings →
  # Secrets and variables → Actions → Variables), not edits to this synced file:
  #   CI_POSTGRES_USER, CI_POSTGRES_PASSWORD, CI_POSTGRES_DB  (defaults below)
  #   CI_RUNNER  — override the runner label (default ubuntu-latest)
  # These are non-secret configuration; leaking them enables nothing.
  #
  # Playwright's Chromium, unlike the Postgres service, is installed only when the
  # repo actually has a browser a11y suite (a playwright.config.* or *.a11y.ts
  # spec). Two asymmetries justify the difference: the install is an active
  # per-run download rather than an idle service container, and a step can carry
  # an `if:` whereas a service cannot. So gating it keeps one uniform file while
  # skipping a pointless download in repos with nothing to render.
  check:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER || 'app' }}
          POSTGRES_PASSWORD: ${{ vars.CI_POSTGRES_PASSWORD || 'app' }}
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB || 'app' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ vars.CI_POSTGRES_USER || 'app' }} -d ${{ vars.CI_POSTGRES_DB || 'app' }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://${{ vars.CI_POSTGRES_USER || 'app' }}:${{ vars.CI_POSTGRES_PASSWORD || 'app' }}@127.0.0.1:5432/${{ vars.CI_POSTGRES_DB || 'app' }}
      # `standards check` verifies the declared GitHub settings
      # (.github/settings.json) against the live repository. The token makes
      # those API reads work on private repos and avoids anonymous rate limits;
      # it cannot hold the admin permission, so repo merge settings it cannot
      # see are reported as unverifiable rather than failing the gate.
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Workflows are the one file class the rest of the gate never exercises —
      # a broken workflow only fails when its trigger fires, after merge. Lint
      # them first: it is the cheapest step, so certain failures cost nothing.
      # The pinless download intentionally tracks the latest release (Dependabot
      # cannot see script-installed binaries, so a pin would go stale silently).
      - name: Lint workflows
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest /tmp
          /tmp/actionlint -color

      - name: Detect browser a11y suite
        id: a11y
        run: |
          if find . -path ./node_modules -prune -o \
            \( -name 'playwright.config.*' -o -name '*.a11y.ts' \) -print | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.a11y.outputs.present == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Check
        run: bun run check
