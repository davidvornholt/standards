name: PR title

# Squash merges use the PR title as the commit subject on main
# (squash_merge_commit_title: PR_TITLE), so the PR title is the only place
# Conventional Commit discipline applies — branch commits get squashed away.
# This lives outside standards.yml because title edits must retrigger the lint
# (the `edited` event) without rerunning the whole quality gate.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Lint PR title as a Conventional Commit subject
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9./-]+\))?!?: [^ ]'
          if printf '%s' "$TITLE" | grep -qE "$pattern"; then
            echo "PR title is a valid Conventional Commit subject: $TITLE"
          else
            echo "::error::PR title must be a Conventional Commit subject, e.g. 'feat(scope): add thing'. Got: $TITLE"
            exit 1
          fi
