name: Publish standards CLI

# A reviewed version in the package manifest is the release declaration. Wait
# for the canonical quality gate to finish so publishing is hard-gated on the
# exact main-branch commit that is packaged and tagged.
on:
  workflow_run:
    workflows:
      - Standards
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: publish-standards-cli
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    outputs:
      publish: ${{ steps.npm.outputs.publish }}
      reconcile: ${{ steps.npm.outputs.reconcile }}
      tag: ${{ steps.declaration.outputs.tag }}
      version: ${{ steps.declaration.outputs.version }}
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify tested commit is on main
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error::Tested commit $RELEASE_SHA is not on main"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Determine release declaration
        id: declaration
        env:
          PACKAGE_NAME: "@davidvornholt/standards"
          PACKAGE_PATH: packages/standards-cli/package.json
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          name="$(jq -er '.name | select(type == "string")' "$PACKAGE_PATH")"
          if [[ "$name" != "$PACKAGE_NAME" ]]; then
            echo "::error::$PACKAGE_PATH name must be $PACKAGE_NAME; received $name"
            exit 1
          fi

          version="$(jq -er '.version | select(type == "string")' "$PACKAGE_PATH")"
          parent_version=
          if git cat-file -e "$RELEASE_SHA^:$PACKAGE_PATH" 2>/dev/null; then
            parent_version="$(git show "$RELEASE_SHA^:$PACKAGE_PATH" | \
              jq -r 'if (.version | type) == "string" then .version else "" end')"
          fi

          bun run --cwd packages/standards-release release:classify -- \
            "$GITHUB_OUTPUT" "$version" "$parent_version"
          printf '%s' "$parent_version" >"$RUNNER_TEMP/release-parent-version"

      - name: Install release tooling
        if: steps.declaration.outputs.declared == 'true'
        run: bun install --frozen-lockfile

      - name: Pack and inspect package
        id: package
        if: steps.declaration.outputs.declared == 'true'
        run: |
          artifact_dir="$RUNNER_TEMP/standards-cli-package"
          mkdir "$artifact_dir"
          bun pm pack \
            --cwd packages/standards-cli \
            --destination "$artifact_dir" \
            --ignore-scripts

          mapfile -t artifacts < <(find "$artifact_dir" -maxdepth 1 -type f -name '*.tgz')
          if [[ "${#artifacts[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one package tarball"
            exit 1
          fi
          tar -tzf "${artifacts[0]}"
          echo "artifact=${artifacts[0]}" >>"$GITHUB_OUTPUT"

      - name: Inspect npm release boundary
        id: npm
        if: steps.declaration.outputs.declared == 'true'
        env:
          PACKAGE_ARTIFACT: ${{ steps.package.outputs.artifact }}
          PACKAGE_NAME: "@davidvornholt/standards"
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_VERSION: ${{ steps.declaration.outputs.version }}
        run: >-
          bun run --cwd packages/standards-release release:state --
          npm "$GITHUB_OUTPUT" "$PACKAGE_NAME" "$RELEASE_VERSION"
          "$(<"$RUNNER_TEMP/release-parent-version")"
          "$PACKAGE_ARTIFACT" "$RELEASE_SHA"

      - name: Preflight GitHub release boundary
        if: steps.npm.outputs.reconcile == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: ${{ steps.declaration.outputs.tag }}
        run: >-
          bun run --cwd packages/standards-release release:state --
          github-inspect "$RUNNER_TEMP/github-release-state"
          "$RELEASE_SHA" "$RELEASE_TAG"

      - name: Setup Node for npm trusted publishing
        if: steps.npm.outputs.publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Verify npm supports trusted publishing
        if: steps.npm.outputs.publish == 'true'
        run: |
          npm_version="$(npm --version)"
          if ! bun -e \
            'if (Bun.semver.order(process.argv[1], "11.5.1") < 0) process.exit(1)' \
            "$npm_version"; then
            echo "::error::npm 11.5.1 or newer is required for trusted publishing"
            exit 1
          fi

      - name: Publish package
        if: steps.npm.outputs.publish == 'true'
        env:
          PACKAGE_TARBALL: ${{ steps.package.outputs.artifact }}
        run: >-
          npm publish "$PACKAGE_TARBALL"
          --ignore-scripts
          --provenance
          --access public
          --tag latest
          --registry=https://registry.npmjs.org

  release:
    needs: publish
    if: >-
      needs.publish.result == 'success' &&
      needs.publish.outputs.reconcile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.publish.outputs.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install release tooling
        run: bun install --frozen-lockfile

      - name: Reconcile verified GitHub tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.publish.outputs.sha }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
        run: >-
          bun run --cwd packages/standards-release release:state --
          github-reconcile "$RUNNER_TEMP/github-release-state"
          "$RELEASE_SHA" "$RELEASE_TAG"
