name: Publish standards CLI

# A reviewed version in the package manifest is the release declaration. Wait
# for the canonical quality gate to finish so publishing is hard-gated on the
# exact main-branch tooling commit. npm's immutable artifact is authoritative
# when a later successful run must finish an interrupted release.
on:
  workflow_run:
    workflows:
      - Standards
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: publish-standards-cli
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.path == '.github/workflows/standards.yml' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Push-capable repository access is required because GitHub only exposes
      # draft releases to List releases callers with push access. The draft
      # preflight runs before the irreversible npm publish step. Keep both in
      # this job: passing release state from a separate job would make that
      # authorization decision stale and widen the race before publication.
      contents: write
      id-token: write
    outputs:
      reconcile: ${{ steps.npm.outputs.reconcile }}
      release_sha: ${{ steps.npm.outputs.release_sha }}
      tag: ${{ steps.declaration.outputs.tag }}
      tool_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify tested commit is on main
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error::Tested commit $RELEASE_SHA is not on main"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Determine release declaration
        id: declaration
        env:
          PACKAGE_NAME: "@davidvornholt/standards"
          PACKAGE_PATH: packages/standards-cli/package.json
          ROOT_PACKAGE_PATH: package.json
          TEMPLATE_PACKAGE_PATH: template/package.json
        run: |
          name="$(jq -er '.name | select(type == "string")' "$PACKAGE_PATH")"
          if [[ "$name" != "$PACKAGE_NAME" ]]; then
            echo "::error::$PACKAGE_PATH name must be $PACKAGE_NAME; received $name"
            exit 1
          fi

          version="$(jq -er '.version | select(type == "string")' "$PACKAGE_PATH")"
          root_version="$(jq -er --arg name "$PACKAGE_NAME" \
            '.devDependencies[$name] | select(type == "string")' \
            "$ROOT_PACKAGE_PATH")"
          if [[ "$root_version" != "$version" ]]; then
            echo "::error::$ROOT_PACKAGE_PATH must declare $PACKAGE_NAME@$version exactly; received $root_version"
            exit 1
          fi
          template_version="$(jq -er --arg name "$PACKAGE_NAME" \
            '.devDependencies[$name] | select(type == "string")' \
            "$TEMPLATE_PACKAGE_PATH")"
          if [[ "$template_version" != "$version" ]]; then
            echo "::error::$TEMPLATE_PACKAGE_PATH must declare $PACKAGE_NAME@$version exactly; received $template_version"
            exit 1
          fi
          bun run --cwd packages/standards-release release:classify -- \
            "$GITHUB_OUTPUT" "$version"

      - name: Install release tooling
        run: bun install --frozen-lockfile

      - name: Inspect npm release boundary
        id: npm
        env:
          PACKAGE_NAME: "@davidvornholt/standards"
          CURRENT_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_VERSION: ${{ steps.declaration.outputs.version }}
        run: >-
          bun run --cwd packages/standards-release release:state --
          npm "$GITHUB_OUTPUT" "$PACKAGE_NAME" "$RELEASE_VERSION"
          "$CURRENT_SHA"

      - name: Verify release commit is in tested history
        if: steps.npm.outputs.reconcile == 'true'
        env:
          RELEASE_SHA: ${{ steps.npm.outputs.release_sha }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if ! git cat-file -e "$RELEASE_SHA^{commit}" 2>/dev/null; then
            echo "::error::Release commit $RELEASE_SHA is not available"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$RELEASE_SHA" "$TESTED_SHA"; then
            echo "::error::Release commit $RELEASE_SHA is not an ancestor of tested commit $TESTED_SHA"
            exit 1
          fi

      - name: Pack and inspect package
        id: package
        if: steps.npm.outputs.publish == 'true'
        env:
          PACKAGE_PATH: ${{ github.workspace }}/packages/standards-cli
          RELEASE_SHA: ${{ steps.npm.outputs.release_sha }}
        run: |
          artifact_dir="$RUNNER_TEMP/standards-cli-package"
          mkdir "$artifact_dir"
          bun run --cwd packages/standards-release release:state -- \
            pack "$GITHUB_OUTPUT" "$PACKAGE_PATH" "$artifact_dir" "$RELEASE_SHA"

      - name: Preflight GitHub release boundary
        if: steps.npm.outputs.reconcile == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.npm.outputs.release_sha }}
          RELEASE_TAG: ${{ steps.declaration.outputs.tag }}
        run: >-
          bun run --cwd packages/standards-release release:state --
          github-inspect "$RUNNER_TEMP/github-release-state"
          "$RELEASE_SHA" "$RELEASE_TAG"

      - name: Setup Node for npm trusted publishing
        if: steps.npm.outputs.publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Verify npm supports trusted publishing
        if: steps.npm.outputs.publish == 'true'
        run: |
          npm_version="$(npm --version)"
          if ! bun -e \
            'if (Bun.semver.order(process.argv[1], "11.5.1") < 0) process.exit(1)' \
            "$npm_version"; then
            echo "::error::npm 11.5.1 or newer is required for trusted publishing"
            exit 1
          fi

      - name: Publish package
        if: steps.npm.outputs.publish == 'true'
        env:
          PACKAGE_TARBALL: ${{ steps.package.outputs.artifact }}
        run: >-
          npm publish "$PACKAGE_TARBALL"
          --ignore-scripts
          --provenance
          --access public
          --tag latest
          --registry=https://registry.npmjs.org

  release:
    needs: publish
    if: >-
      needs.publish.result == 'success' &&
      needs.publish.outputs.reconcile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout tested release tooling
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.publish.outputs.tool_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install release tooling
        run: bun install --frozen-lockfile

      - name: Reconcile verified GitHub tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.publish.outputs.release_sha }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
        run: >-
          bun run --cwd packages/standards-release release:state --
          github-reconcile "$RUNNER_TEMP/github-release-state"
          "$RELEASE_SHA" "$RELEASE_TAG"
