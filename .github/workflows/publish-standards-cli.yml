name: Publish standards CLI

# A reviewed version in the package manifest is the release declaration. Wait
# for the canonical quality gate to finish so publishing is hard-gated on the
# exact main-branch commit that is packaged and tagged.
on:
  workflow_run:
    workflows:
      - Standards
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: publish-standards-cli
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      reconcile: ${{ steps.release.outputs.reconcile }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify tested commit is on main
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error::Tested commit $RELEASE_SHA is not on main"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Determine release state
        id: release
        env:
          PACKAGE_NAME: "@davidvornholt/standards"
          PACKAGE_PATH: packages/standards-cli/package.json
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          name="$(jq -er '.name | select(type == "string")' "$PACKAGE_PATH")"
          if [[ "$name" != "$PACKAGE_NAME" ]]; then
            echo "::error::$PACKAGE_PATH name must be $PACKAGE_NAME; received $name"
            exit 1
          fi

          version="$(jq -er '.version | select(type == "string")' "$PACKAGE_PATH")"
          parent_version="$(git show "$RELEASE_SHA^:$PACKAGE_PATH" | \
            jq -er '.version | select(type == "string")')"

          if [[ "$version" == "$parent_version" ]]; then
            bun run --cwd packages/standards-cli release:state -- \
              plan "$GITHUB_OUTPUT" "$version" "$parent_version" "" false
            echo "version=$version" >>"$GITHUB_OUTPUT"
            echo "tag=v$version" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          encoded_name="${PACKAGE_NAME/@/%40}"
          encoded_name="${encoded_name//\//%2F}"
          metadata="$(curl --fail --silent --show-error \
            "https://registry.npmjs.org/$encoded_name")"
          latest="$(jq -er '.["dist-tags"].latest' <<<"$metadata")"

          if jq -e --arg version "$version" '.versions[$version] != null' \
            <<<"$metadata" >/dev/null; then
            npm_version_exists=true
          else
            npm_version_exists=false
          fi

          bun run --cwd packages/standards-cli release:state -- \
            plan "$GITHUB_OUTPUT" "$version" "$parent_version" \
            "$latest" "$npm_version_exists"

          {
            echo "version=$version"
            echo "tag=v$version"
          } >>"$GITHUB_OUTPUT"

      - name: Setup Node for npm trusted publishing
        if: steps.release.outputs.publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Verify npm supports trusted publishing
        if: steps.release.outputs.publish == 'true'
        run: |
          npm_version="$(npm --version)"
          if ! bun -e \
            'if (Bun.semver.order(process.argv[1], "11.5.1") < 0) process.exit(1)' \
            "$npm_version"; then
            echo "::error::npm 11.5.1 or newer is required for trusted publishing"
            exit 1
          fi

      - name: Pack and inspect package
        id: package
        if: steps.release.outputs.publish == 'true'
        run: |
          artifact_dir="$RUNNER_TEMP/standards-cli-package"
          mkdir "$artifact_dir"
          bun pm pack \
            --cwd packages/standards-cli \
            --destination "$artifact_dir" \
            --ignore-scripts

          mapfile -t artifacts < <(find "$artifact_dir" -maxdepth 1 -type f -name '*.tgz')
          if [[ "${#artifacts[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one package tarball"
            exit 1
          fi
          tar -tzf "${artifacts[0]}"
          echo "artifact=${artifacts[0]}" >>"$GITHUB_OUTPUT"

      - name: Publish package
        if: steps.release.outputs.publish == 'true'
        env:
          PACKAGE_TARBALL: ${{ steps.package.outputs.artifact }}
        run: >-
          npm publish "$PACKAGE_TARBALL"
          --ignore-scripts
          --provenance
          --access public
          --tag latest
          --registry=https://registry.npmjs.org

  release:
    needs: publish
    if: >-
      needs.publish.result == 'success' &&
      needs.publish.outputs.reconcile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.publish.outputs.sha }}

      - name: Determine GitHub release state
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.publish.outputs.sha }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
        run: |
          release_status=absent
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" == "true" ]]; then
              release_status=draft
            else
              release_status=published
            fi
          fi

          tag_sha=
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" \
            >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            tag_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          fi

          bun run --cwd packages/standards-cli release:state -- \
            reconcile "$GITHUB_OUTPUT" "$RELEASE_SHA" "$release_status" "$tag_sha"

      - name: Create GitHub release
        if: steps.release.outputs.action == 'create'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.publish.outputs.sha }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --generate-notes \
            --target "$RELEASE_SHA" \
            --title "$RELEASE_TAG"
