name: Resolve SOPS secret
description: Install pinned SOPS and export one validated secret value

inputs:
  age-key:
    description: Age identity that can decrypt the secret file
    required: false
  secret-file:
    description: SOPS-encrypted YAML file
    required: true
  secret-key:
    description: Direct key or dotted path to resolve from the decrypted ci mapping
    required: true
  env-name:
    description: Environment variable to export for later workflow steps
    required: true
  fallback-value:
    description: Value to export when fallback mode handles an unresolvable secret
    required: false
  failure-mode:
    description: Whether an unresolvable secret (missing key or file, SOPS setup failure, decrypt or validation failure) fails or uses fallback-value
    required: false
    default: fail

outputs:
  used-fallback:
    description: Whether fallback-value was exported
    value: ${{ steps.resolve.outputs.used-fallback }}

runs:
  using: composite
  steps:
    - name: Resolve and validate secret
      id: resolve
      shell: bash
      env:
        SOPS_AGE_KEY: ${{ inputs.age-key }}
        SOPS_SECRET_FILE: ${{ inputs.secret-file }}
        SOPS_SECRET_KEY: ${{ inputs.secret-key }}
        SOPS_ENV_NAME: ${{ inputs.env-name }}
        SOPS_FALLBACK_VALUE: ${{ inputs.fallback-value }}
        SOPS_FAILURE_MODE: ${{ inputs.failure-mode }}
      run: |
        set -euo pipefail

        if [[ ! "$SOPS_ENV_NAME" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
          echo "::error::env-name must be a valid environment variable name"
          exit 1
        fi
        if [[ "$SOPS_FAILURE_MODE" != fail && "$SOPS_FAILURE_MODE" != fallback ]]; then
          echo "::error::failure-mode must be either fail or fallback"
          exit 1
        fi

        decrypted_file=$(mktemp "$RUNNER_TEMP/sops-secret-decrypted.XXXXXX")
        value_file=$(mktemp "$RUNNER_TEMP/sops-secret-value.XXXXXX")
        trap 'rm -f "$decrypted_file" "$value_file"' EXIT

        reason=""
        if [ -z "$SOPS_AGE_KEY" ]; then
          reason="SOPS_AGE_KEY is not configured"
        elif [ ! -f "$SOPS_SECRET_FILE" ]; then
          reason="$SOPS_SECRET_FILE does not exist"
        else
          version=v3.13.2
          case "$(uname -m)" in
            x86_64) arch=amd64 sha=154dfe4cd70554bdd82b98e4cd4acf191d43d01ead6f00a73477aa44c4ac42ef ;;
            aarch64) arch=arm64 sha=78abf2e15c86250a1553ae6f53aba96be6b2a8126f160b1534959add3467ad76 ;;
            *) reason="No pinned SOPS binary for runner architecture $(uname -m)" ;;
          esac
          sops="$RUNNER_TEMP/sops"
          if [ -z "$reason" ] && ! curl -sfLo "$sops" "https://github.com/getsops/sops/releases/download/${version}/sops-${version}.linux.${arch}"; then
            rm -f "$sops"
            reason="Downloading SOPS ${version} for linux/${arch} failed"
          fi
          if [ -z "$reason" ] && ! echo "$sha  $sops" | sha256sum --check --quiet; then
            rm -f "$sops"
            reason="Downloaded SOPS binary does not match the pinned checksum"
          fi
          if [ -z "$reason" ]; then
            chmod +x "$sops"
            if ! "$sops" decrypt --output-type json "$SOPS_SECRET_FILE" > "$decrypted_file"; then
              reason="Decrypting $SOPS_SECRET_FILE with SOPS failed"
            else
              lookup_filter='
                def descend($root; $path):
                  reduce $path[] as $part (
                    { found: true, value: $root };
                    if .found and (.value | type) == "object" and (.value | has($part))
                    then { found: true, value: .value[$part] }
                    else { found: false, value: null }
                    end
                  );
                def resolve:
                  if (.ci | type) != "object" then
                    { status: "missing", value: null }
                  else
                    .ci as $ci
                    | ($key | split(".")) as $path
                    | ($ci | has($key)) as $has_direct
                    | descend($ci; $path) as $nested
                    | if ($path | length) > 1 and $has_direct and $nested.found then
                        { status: "ambiguous", value: null }
                      elif $has_direct then
                        { status: "found", value: $ci[$key] }
                      elif $nested.found then
                        { status: "found", value: $nested.value }
                      else
                        { status: "missing", value: null }
                      end
                    | if .status != "found" then .
                      elif (.value | type) != "string" then .status = "non-string"
                      elif .value == "" then .status = "empty"
                      else .
                      end
                  end;
                resolve
              '
              if ! lookup_status=$(jq -r --arg key "$SOPS_SECRET_KEY" "$lookup_filter | .status" "$decrypted_file"); then
                reason="Resolving ci.$SOPS_SECRET_KEY from $SOPS_SECRET_FILE failed"
              else
                case "$lookup_status" in
                  found)
                    jq -j --arg key "$SOPS_SECRET_KEY" "$lookup_filter | .value" "$decrypted_file" > "$value_file"
                    ;;
                  missing)
                    reason="ci.$SOPS_SECRET_KEY is missing in $SOPS_SECRET_FILE"
                    ;;
                  ambiguous)
                    reason="ci.$SOPS_SECRET_KEY is ambiguous because both a direct key and nested path exist in $SOPS_SECRET_FILE"
                    ;;
                  non-string)
                    reason="ci.$SOPS_SECRET_KEY is not a string in $SOPS_SECRET_FILE"
                    ;;
                  empty)
                    reason="ci.$SOPS_SECRET_KEY is empty in $SOPS_SECRET_FILE"
                    ;;
                  *)
                    reason="Resolving ci.$SOPS_SECRET_KEY from $SOPS_SECRET_FILE returned an unknown status"
                    ;;
                esac
              fi
            fi
          fi
        fi

        use_fallback=false
        if [ -n "$reason" ]; then
          use_fallback=true
          if [ "$SOPS_FAILURE_MODE" = fail ]; then
            echo "::error::$reason"
            exit 1
          fi
          printf '%s' "$SOPS_FALLBACK_VALUE" > "$value_file"
          echo "::warning::$reason; using the configured fallback"
        fi
        if [ ! -s "$value_file" ]; then
          echo "::error::Resolved secret value must be non-empty"
          exit 1
        fi

        line_break_count=$(LC_ALL=C tr -cd '\r\n' < "$value_file" | wc -c)
        if [ "$line_break_count" -eq 0 ]; then
          value=$(< "$value_file")
          printf '%s\n' "::add-mask::$value"
          printf '%s=%s\n' "$SOPS_ENV_NAME" "$value" >> "$GITHUB_ENV"
        else
          while IFS= read -r line || [ -n "$line" ]; do
            if [ -n "$line" ]; then
              escaped_line=${line//'%'/'%25'}
              escaped_line=${escaped_line//$'\r'/'%0D'}
              printf '%s\n' "::add-mask::$escaped_line"
            fi
          done < "$value_file"

          delimiter=SOPS_SECRET_EOF
          delimiter_suffix=0
          while grep -Fqx "$delimiter" "$value_file" || grep -Fqx "$delimiter"$'\r' "$value_file"; do
            delimiter_suffix=$((delimiter_suffix + 1))
            delimiter="SOPS_SECRET_EOF_$delimiter_suffix"
          done
          printf '%s<<%s\n' "$SOPS_ENV_NAME" "$delimiter" >> "$GITHUB_ENV"
          cat "$value_file" >> "$GITHUB_ENV"
          printf '\n%s\n' "$delimiter" >> "$GITHUB_ENV"
        fi
        printf 'used-fallback=%s\n' "$use_fallback" >> "$GITHUB_OUTPUT"
