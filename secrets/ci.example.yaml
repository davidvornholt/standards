# Plaintext shape only. Do not put real CI secrets in this file.
# Mirror this shape in the encrypted secrets/ci.yaml (SOPS + age), decrypted in
# CI with the SOPS_AGE_KEY GitHub Actions secret. This file is seeded once and
# then owned by your repo — extend it to match your real secrets; sync will not
# overwrite it.
ci:
  example_token: replace-with-a-ci-scoped-token
  # Full ntfy topic URL the `Notify pause` workflow pushes to when an agent
  # review cycle pauses on a question. The topic name is the only access
  # control, so make it random and unguessable.
  ntfy_topic_url: https://ntfy.sh/replace-with-a-random-unguessable-topic
  # Fine-grained PAT with read-only "Administration" and "Issues" access to
  # this repository. The standards gate uses Administration to verify repo
  # merge settings and ruleset bypass actors, and Issues to read declared
  # repository labels. The gate fails closed on state its token cannot see.
  github_settings_read_token: replace-with-a-fine-grained-settings-read-pat
  # GitHub App credentials installed only on this repository. The `Standards
  # sync` workflow mints a short-lived token with Contents read and Pull
  # requests write; missing credentials or failed minting stop the workflow.
  # Provision this nested shape with:
  # bun standards creds add github --dest ci:ci.broker_app
  broker_app:
    app_id: replace-with-the-broker-github-app-id
    private_key: |-
      -----BEGIN RSA PRIVATE KEY-----
      replace-with-the-broker-github-app-private-key
      -----END RSA PRIVATE KEY-----
