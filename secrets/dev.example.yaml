# Plaintext shape only. Do not put real development secrets in this file.
# Mirror this shape in the encrypted secrets/dev.yaml (SOPS + age). Each
# workspace documents the values it consumes in its own README.
apps:
  web:
    DATABASE_URL: postgresql://app:app@127.0.0.1:5432/app_dev
    AUTH_SECRET: replace-with-a-long-random-dev-secret
packages:
  db:
    DATABASE_URL: postgresql://app:app@127.0.0.1:5432/app_dev
