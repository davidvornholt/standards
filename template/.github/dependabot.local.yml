# Repo-owned Dependabot extension, composed with the canonical
# .github/dependabot.base.yml into the generated .github/dependabot.yml by
# `bun standards sync` (or `bun standards dependabot --write`). Additive only:
# add repo-specific ecosystems as new update blocks, add top-level private
# registry definitions, or repeat a canonical normalized target to add ignore
# and/or registries entries. Example for a repository with Nix flake infrastructure:
#
#   updates:
#     - package-ecosystem: "nix"
#       directory: "/"
#       schedule:
#         interval: "weekly"
updates: []
