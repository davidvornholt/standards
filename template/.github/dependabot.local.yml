# Repo-owned Dependabot extension, composed with the canonical
# .github/dependabot.base.yml into the generated .github/dependabot.yml by
# `bun standards sync` (or `bun standards dependabot --write`). Additive only:
# add repo-specific ecosystems as new update blocks, or add repo-local version
# holds by repeating a canonical block's package-ecosystem and directory with
# only an ignore list. Example for a repository with Nix flake infrastructure:
#
#   updates:
#     - package-ecosystem: "nix"
#       directory: "/"
#       schedule:
#         interval: "weekly"
updates: []
