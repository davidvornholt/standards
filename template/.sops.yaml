# Repo-owned SOPS policy. Replace the placeholder recipients below with your
# real age public keys (`age-keygen` prints one; the declarative-infra skill
# has key-management helpers), then encrypt secrets/*.yaml. This file is
# seeded once and never synced.
keys:
  # Personal identity at ~/.config/sops/age/keys.txt. Rename the anchor so it
  # identifies person and machine — the hostname verbatim when it already
  # encodes the owner, otherwise prefixed with the person.
  - &primary age1replacewithyourpersonalagerecipientpublickeyxxxxxxxxxxxxxxxxxx
  # GitHub Actions CI recipient (private key: SOPS_AGE_KEY Actions secret).
  - &ci age1replacewithyourgithubactionscirecipientpublickeyxxxxxxxxxxxxxxxxxxx
creation_rules:
  - path_regex: secrets/dev\.yaml$
    key_groups:
      - age:
          - *primary
  - path_regex: secrets/ci\.yaml$
    key_groups:
      - age:
          - *primary
          - *ci
